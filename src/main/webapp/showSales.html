<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>売上状況 | Flea Market</title>

<meta name="viewport" content="width=device-width">
<link href="http://fonts.googleapis.com/css?family=Paytone+One" rel="stylesheet" type="text/css">
<link href="http://netdna.bootstrapcdn.com/font-awesome/4.2.0/css/font-awesome.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<body>
<!-- ===== ヘッダー ===== -->
<header class="top">
    <div class="box1">
        <div class="site">
            <h1><a href="menu.html">Flea Market</a></h1>
        </div>
    </div>
<div class="box2">
    <div class="box2-inner">
        <nav class="menu">
            <ul>
                <li><a href="login.html">ログイン</a></li>
                <li><a href="menu.html">メニュー</a></li>
            </ul>
        </nav>
    </div>
</div>
</header>

<!-- ===== メイン ===== -->
<div class="boxA">
<main class="box3">
<article class="kiji">
    <h1>売上状況</h1>
<!-- 検索フォーム -->
<form action="#" method="get" style="text-align:center;">
    年 <input type="text" style="width:80px;">
    月 <input type="text" style="width:80px;">
    <button type="submit">検索</button>
</form>
<!-- ===== サマリー ===== -->
<div class="sales-summary">
    <div class="sales-box">
        <h2>フリマ会社売上</h2>
        <p>¥120,000</p>
    </div>
    <div class="sales-box">
        <h2>ユーザー売上合計</h2>
        <p>¥880,000</p>
    </div>
    <div class="sales-box">
        <h2>総売上</h2>
        <p>¥1,000,000</p>
    </div>
</div>
<!-- ===== 詳細テーブル ===== -->
<table class="sales-table">
    <thead>
        <tr>
            <th>商品名</th>
            <th>出品者</th>
            <th>価格</th>
            <th>数量</th>
            <th>売上</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>スニーカー</td>
            <td>taro123</td>
            <td>¥5,000</td>
            <td>2</td>
            <td>¥10,000</td>
        </tr>
        <tr>
            <td>バッグ</td>
            <td>hana456</td>
            <td>¥8,000</td>
            <td>1</td>
            <td>¥8,000</td>
        </tr>
        <tr>
            <td>腕時計</td>
            <td>ichi789</td>
            <td>¥12,000</td>
            <td>3</td>
            <td>¥36,000</td>
        </tr>
        <tr>
            <td>ジャケット</td>
            <td>misaki001</td>
            <td>¥7,000</td>
            <td>2</td>
            <td>¥14,000</td>
        </tr>
    </tbody>
</table>
</article>
</main>
</div>
</body>
</html>
